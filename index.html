<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="شات"/>
<meta name="theme-color" content="#6c63ff"/>
<title>شات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--sidebar:#0f0f1e;--card:#151525;
  --border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#ff6584;
  --text:#e8e8f0;--muted:#555570;
  --msg-me:linear-gradient(135deg,#6c63ff,#a78bfa);--msg-them:#1a1a2e;
}
html,body{width:100%;height:100%;overflow:hidden}
@supports(padding:max(0px)){.sidebar{padding-top:env(safe-area-inset-top)}.chat-hdr{padding-top:max(13px,env(safe-area-inset-top))}}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);display:flex}

/* AUTH */
#auth-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:radial-gradient(ellipse at 30% 30%,rgba(108,99,255,0.15) 0,transparent 60%),
                   radial-gradient(ellipse at 70% 70%,rgba(255,101,132,0.1) 0,transparent 60%);
}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px;width:360px;max-width:94vw;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .icon{font-size:44px;display:block;margin-bottom:8px}
.auth-logo h1{font-size:22px;font-weight:900;color:#fff}
.auth-logo p{font-size:13px;color:var(--muted);margin-top:4px}
.tab-btns{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px}
.tab-btn{flex:1;padding:9px;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;direction:ltr}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--muted);direction:rtl}
.auth-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{background:rgba(255,101,132,0.12);border:1px solid rgba(255,101,132,0.3);border-radius:10px;padding:10px 12px;font-size:13px;color:#ff6584;margin-bottom:12px;display:none}

/* APP LAYOUT */
#app{display:none;width:100%;height:100vh;position:relative;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:300px;min-width:260px;height:100%;
  background:var(--sidebar);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  position:relative;z-index:50;
}
.sidebar-header{padding:20px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sidebar-top h2{font-size:18px;font-weight:900;color:#fff}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;position:relative}
.logout-btn{position:absolute;top:40px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--accent2);cursor:pointer;white-space:nowrap;display:none;z-index:99;font-family:'Cairo',sans-serif}
.user-av:hover .logout-btn{display:block}
.search-box{position:relative}
.search-box input{width:100%;padding:9px 34px 9px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;direction:rtl}
.search-box input:focus{border-color:var(--accent)}
.search-box span{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:13px}
.contacts{flex:1;overflow-y:auto;padding:4px 0}
.ci{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:.15s;border-right:3px solid transparent}
.ci:hover{background:rgba(255,255,255,0.03)}
.ci.active{background:rgba(108,99,255,0.1);border-right-color:var(--accent)}
.ci-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;position:relative}
.ci-dot{position:absolute;bottom:1px;left:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--sidebar);background:#34d399}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:700;color:#f0f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-prev{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-time{font-size:10px;color:var(--muted);flex-shrink:0}
.new-btn{margin:8px 12px;padding:10px;border:1px dashed rgba(108,99,255,0.4);border-radius:12px;background:rgba(108,99,255,0.05);color:var(--accent);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.new-btn:hover{background:rgba(108,99,255,0.12)}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;background:var(--bg)}
.chat-hdr{padding:13px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);background:rgba(15,15,30,0.95);flex-shrink:0}
.ch-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;position:relative}
.ch-dot{position:absolute;bottom:1px;left:1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg);background:#34d399}
.ch-nm{font-size:14px;font-weight:700;color:#fff}
.ch-st{font-size:11px;color:var(--muted);margin-top:1px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty .ico{font-size:52px}
.empty p{font-size:14px;font-weight:600;color:#333355}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}
.mrow{display:flex;align-items:flex-end;gap:7px;animation:fu .2s ease both}
.mrow.me{flex-direction:row}
.mrow.them{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.mb{max-width:70%;padding:9px 13px;font-size:14px;line-height:1.5;word-break:break-word}
.mrow.me .mb{background:var(--msg-me);color:#fff;border-radius:16px 16px 4px 16px;box-shadow:0 4px 15px rgba(108,99,255,0.3)}
.mrow.them .mb{background:var(--msg-them);color:var(--text);border-radius:16px 16px 16px 4px;border:1px solid var(--border)}
.mt{font-size:10px;margin-top:3px;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:3px}
.mrow.them .mt{color:var(--muted);justify-content:flex-end}
.mimg{max-width:100%;max-height:200px;border-radius:10px;display:block;cursor:pointer;object-fit:cover}
.mimg-b{padding:3px!important}

/* INPUT */
.inp-area{padding:10px 14px;display:flex;gap:7px;align-items:flex-end;border-top:1px solid var(--border);background:rgba(15,15,30,0.98);flex-shrink:0}
.inp-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.inp-btn:hover{background:rgba(108,99,255,0.15)}
.txt-inp{flex:1;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;direction:rtl;resize:none;max-height:90px;line-height:1.4;transition:.2s}
.txt-inp:focus{border-color:var(--accent)}
.txt-inp::placeholder{color:var(--muted)}
.snd-btn{width:42px;height:42px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
.snd-btn:hover{transform:scale(1.05);box-shadow:0 5px 18px rgba(108,99,255,0.5)}

/* EMOJI */
.emj-panel{padding:10px 14px;display:none;flex-wrap:wrap;gap:5px;border-top:1px solid var(--border);background:rgba(15,15,30,0.98);flex-shrink:0}
.emj-panel.show{display:flex}
.ep-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:18px;transition:.1s}
.ep-btn:hover{transform:scale(1.2)}

/* IMG PREVIEW */
.img-prev-wrap{padding:7px 14px;border-top:1px solid var(--border);background:rgba(15,15,30,0.98);display:none;align-items:center;gap:10px;flex-shrink:0}
.img-prev-wrap.show{display:flex}
.img-prev{width:50px;height:50px;border-radius:9px;object-fit:cover;border:2px solid var(--accent)}
.img-cancel{background:rgba(255,101,132,0.2);border:none;border-radius:7px;color:#ff6584;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.upbar{height:3px;background:var(--accent);width:0%;transition:width .3s;flex-shrink:0}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:300;display:none;align-items:center;justify-content:center}
.lbox.show{display:flex}
.lbox img{max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain}
.lbox-x{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer}

/* TOAST */
.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:9px;z-index:400;transform:translateX(120%);transition:.3s;max-width:270px;box-shadow:0 8px 28px rgba(0,0,0,0.5);cursor:pointer}
.toast.show{transform:translateX(0)}
.t-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.t-nm{font-size:12px;font-weight:700;color:#fff}
.t-mg{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-ov.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;width:340px;max-width:92vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:#fff}
.modal p{font-size:12px;color:var(--muted);margin-bottom:12px}
.modal input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-bottom:12px;direction:ltr}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:11px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.m-cancel{background:rgba(255,255,255,0.07);color:var(--muted)}
.m-ok{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.m-err{font-size:12px;color:var(--accent2);margin-bottom:8px;display:none}

/* BACK BTN */
.back-btn{display:none;background:rgba(255,255,255,0.06);border:none;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:15px;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}

/* MOBILE */
@media(max-width:640px){
  #app{display:block!important}
  .sidebar{
    position:fixed;inset:0;width:100%;height:100%;
    transform:translateX(0);transition:transform .3s;z-index:50;
  }
  .sidebar.hidden{transform:translateX(100%)}
  .chat-area{position:fixed;inset:0;width:100%;height:100%;display:none;flex-direction:column}
  .chat-area.show{display:flex}
  .back-btn{display:flex!important}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(108,99,255,0.3);border-radius:3px}

/* ANIMATIONS */
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box" style="animation:si .4s ease">
    <div class="auth-logo"><span class="icon">💬</span><h1>شات</h1><p>تواصل مع أصدقائك في لحظة</p></div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('login')">تسجيل دخول</button>
      <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div id="login-form">
      <div class="field"><label>البريد الإلكتروني</label><input type="email" id="l-email" placeholder="example@email.com"/></div>
      <div class="field"><label>كلمة المرور</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doLogin()">دخول</button>
      <button style="width:100%;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;margin-top:8px" onclick="resendVerification()">لم تصلك رسالة التأكيد؟ أعد الإرسال</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>الاسم</label><input type="text" id="r-name" placeholder="اسمك"/></div>
      <div class="field"><label>البريد الإلكتروني</label><input type="email" id="r-email" placeholder="example@email.com"/></div>
      <div class="field"><label>كلمة المرور</label><input type="password" id="r-pass" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doRegister()">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;height:100vh;overflow:hidden">
  <div style="display:flex;width:100%;height:100%">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-top">
          <h2>الرسائل</h2>
          <div class="user-av" id="my-av"><span id="my-av-l">؟</span><button class="logout-btn" onclick="doLogout()">🚪 خروج</button></div>
        </div>
        <div class="search-box">
          <input type="text" placeholder="بحث..." id="srch" oninput="filterC(this.value)"/>
          <span>🔍</span>
        </div>
      </div>
      <button class="new-btn" onclick="openNew()">+ بدء محادثة جديدة</button>
      <div class="contacts" id="contacts"><div style="text-align:center;padding:28px;color:var(--muted);font-size:13px">جاري التحميل...</div></div>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chat-area">
      <div class="empty" id="empty"><div class="ico">💬</div><p>اختر محادثة أو ابدأ واحدة جديدة</p></div>
      <div id="active-chat" style="display:none;flex-direction:column;flex:1;min-height:0;height:100%">
        <div class="chat-hdr">
          <button class="back-btn" onclick="goBack()">←</button>
          <div class="ch-av" id="ch-av"><span id="ch-av-l"></span><div class="ch-dot"></div></div>
          <div><div class="ch-nm" id="ch-nm"></div><div class="ch-st" id="ch-st"></div></div>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="upbar" id="upbar"></div>
        <div class="img-prev-wrap" id="img-prev-wrap">
          <img class="img-prev" id="img-prev" src=""/>
          <div style="flex:1;font-size:12px;color:var(--muted)">صورة جاهزة</div>
          <button class="img-cancel" onclick="cancelImg()">✕</button>
        </div>
        <div class="emj-panel" id="emj-panel"></div>
        <div class="inp-area">
          <button class="inp-btn" onclick="toggleEmj()">😊</button>
          <button class="inp-btn" onclick="document.getElementById('fi').click()">📷</button>
          <input type="file" id="fi" accept="image/*" style="display:none" onchange="handleImg(this)"/>
          <textarea class="txt-inp" id="txt" placeholder="اكتب رسالة..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
          <button class="snd-btn" onclick="send()">➤</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <h3>💬 بدء محادثة جديدة</h3>
    <p>ادخل البريد الإلكتروني للشخص</p>
    <div id="m-err" class="m-err"></div>
    <input type="email" id="m-email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')startChat()"/>
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeNew()">إلغاء</button>
      <button class="m-ok" onclick="startChat()">ابدأ</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lbox" id="lbox" onclick="closeLbox()">
  <button class="lbox-x">✕</button>
  <img id="lbox-img" src=""/>
</div>

<!-- TOAST -->
<div class="toast" id="toast" onclick="document.getElementById('toast').classList.remove('show')">
  <div class="t-av" id="t-av"></div>
  <div><div class="t-nm" id="t-nm"></div><div class="t-mg" id="t-mg"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, limit, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FC = {
  apiKey:"AIzaSyDWkoKwK7sgKOQ-8eTiMaLtCX0NwbWQC7Y",
  authDomain:"chat-641b0.firebaseapp.com",
  projectId:"chat-641b0",
  storageBucket:"chat-641b0.firebasestorage.app",
  messagingSenderId:"438618691190",
  appId:"1:438618691190:web:9dd86082d9ba927366b157"
};

const fbApp=initializeApp(FC);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);
const storage=getStorage(fbApp);

const COLORS=["#6c63ff","#ff6584","#43d9ad","#f59e0b","#3b82f6","#ec4899","#10b981","#8b5cf6"];
const gc=uid=>COLORS[uid.charCodeAt(0)%COLORS.length];
const gl=name=>name?name.charAt(0).toUpperCase():"؟";
const gid=(a,b)=>[a,b].sort().join("_");

let me=null,chatId=null,otherUser=null,msgUnsub=null,cvUnsub=null;
let allCvs=[],pendImg=null,lastCount=0,toastT=null;

// SOUND
let actx;
function snd(type){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    if(type==='send'){
      o.frequency.setValueAtTime(880,actx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200,actx.currentTime+.12);
      g.gain.setValueAtTime(.1,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.15);
      o.start();o.stop(actx.currentTime+.15);
    }else{
      o.frequency.setValueAtTime(500,actx.currentTime);
      o.frequency.exponentialRampToValueAtTime(900,actx.currentTime+.1);
      g.gain.setValueAtTime(.15,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.22);
      o.start();o.stop(actx.currentTime+.22);
    }
  }catch(e){}
}

// TOAST
function toast(name,msg,color){
  document.getElementById('t-av').textContent=gl(name);
  document.getElementById('t-av').style.cssText=`background:${color}33;color:${color};width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0`;
  document.getElementById('t-nm').textContent=name;
  document.getElementById('t-mg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),4000);
  if('Notification'in window&&Notification.permission==='granted'&&document.hidden)
    new Notification('💬 '+name,{body:msg});
  snd('receive');
}

// AUTH
window.switchTab=tab=>{
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('register-form').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-err').style.display='none';
};

const showErr=msg=>{const e=document.getElementById('auth-err');e.textContent=msg;e.style.display='block';};

window.doLogin=async()=>{
  const email=document.getElementById('l-email').value.trim(),pass=document.getElementById('l-pass').value;
  if(!email||!pass)return showErr('أدخل البريد وكلمة المرور');
  const btn=document.querySelector('#login-form .auth-btn');
  btn.disabled=true;btn.textContent='جاري الدخول...';
  try{
    const c=await signInWithEmailAndPassword(auth,email,pass);
    if(!c.user.emailVerified){
      await signOut(auth);
      btn.disabled=false;btn.textContent='دخول';
      showErr('⚠️ لازم تأكد إيميلك الأول! افتح الرسالة اللي اتبعتلك واضغط على رابط التأكيد');
      return;
    }
  }
  catch(e){showErr('خطأ: '+(e.code||e.message));btn.disabled=false;btn.textContent='دخول';}
};

window.doRegister=async()=>{
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!name||!email||!pass)return showErr('اكمل كل البيانات');
  if(pass.length<6)return showErr('كلمة المرور 6 حروف على الأقل');
  const btn=document.querySelector('#register-form .auth-btn');
  btn.disabled=true;btn.textContent='جاري الإنشاء...';
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(c.user,{displayName:name});
    await setDoc(doc(db,'users',c.user.uid),{uid:c.user.uid,name,email,createdAt:serverTimestamp()});
    await sendEmailVerification(c.user);
    await signOut(auth);
    btn.disabled=false;btn.textContent='إنشاء حساب';
    showErr('✅ تم إنشاء الحساب! راجع إيميلك وأكد عنوانك قبل الدخول');
    document.getElementById('auth-err').style.background='rgba(52,211,153,0.12)';
    document.getElementById('auth-err').style.borderColor='rgba(52,211,153,0.3)';
    document.getElementById('auth-err').style.color='#34d399';
    switchTab('login');
  }catch(e){showErr('خطأ: '+(e.code||e.message));btn.disabled=false;btn.textContent='إنشاء حساب';}
};

window.resendVerification=async()=>{
  const email=document.getElementById('l-email').value.trim(),pass=document.getElementById('l-pass').value;
  if(!email||!pass){showErr('أدخل البريد وكلمة المرور الأول');return;}
  try{
    const c=await signInWithEmailAndPassword(auth,email,pass);
    if(c.user.emailVerified){showErr('✅ إيميلك متأكد بالفعل! يمكنك الدخول');return;}
    await sendEmailVerification(c.user);
    await signOut(auth);
    const e=document.getElementById('auth-err');
    e.textContent='📧 تم إرسال رسالة تأكيد جديدة! راجع الإيميل';
    e.style.display='block';e.style.background='rgba(52,211,153,0.12)';
    e.style.borderColor='rgba(52,211,153,0.3)';e.style.color='#34d399';
  }catch(e){showErr('خطأ: '+(e.code||e.message));}
};

window.doLogout=()=>signOut(auth);

onAuthStateChanged(auth,async user=>{
  if(user){
    me=user;
    document.getElementById('auth-screen').style.display='none';
    const appEl=document.getElementById('app');
    appEl.style.display='flex';
    appEl.style.flex='1';
    appEl.style.height='100vh';
    appEl.style.overflow='hidden';
    document.getElementById('my-av-l').textContent=gl(user.displayName||user.email);
    if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
    loadCvs();
  }else{
    me=null;
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// CONVERSATIONS
function loadCvs(){
  if(cvUnsub)cvUnsub();
  const q=query(collection(db,'conversations'),where('members','array-contains',me.uid));
  cvUnsub=onSnapshot(q,async snap=>{
    const cvs=[];
    for(const d of snap.docs){
      const data=d.data(),oid=data.members.find(m=>m!==me.uid);
      const ud=await getDoc(doc(db,'users',oid));
      if(ud.exists())cvs.push({id:d.id,...data,ou:ud.data()});
    }
    cvs.sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0));
    allCvs=cvs;renderCvs(cvs);
  });
}

function renderCvs(cvs){
  const el=document.getElementById('contacts');
  if(!cvs.length){el.innerHTML='<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px">لا توجد محادثات<br><small>ابدأ محادثة جديدة 👆</small></div>';return;}
  el.innerHTML=cvs.map(c=>{
    const u=c.ou,color=gc(u.uid),time=c.lastTime?fmt(c.lastTime.toDate()):'';
    return`<div class="ci ${chatId===c.id?'active':''}" onclick="openChat('${c.id}','${u.uid}')">
      <div class="ci-av" style="background:${color}22;border:2px solid ${color}44;color:${color}">${gl(u.name)}<div class="ci-dot"></div></div>
      <div class="ci-info"><div class="ci-name">${u.name}</div><div class="ci-prev">${c.lastMsg||'ابدأ المحادثة...'}</div></div>
      <div class="ci-time">${time}</div>
    </div>`;
  }).join('');
}

window.filterC=q=>renderCvs(allCvs.filter(c=>c.ou.name.includes(q)||c.ou.email.includes(q)));

// OPEN CHAT
window.openChat=async(cid,oid)=>{
  chatId=cid;
  const ud=await getDoc(doc(db,'users',oid));
  otherUser=ud.data();
  const color=gc(oid);
  document.getElementById('ch-av-l').textContent=gl(otherUser.name);
  const chav=document.getElementById('ch-av');
  chav.style.background=`${color}22`;chav.style.border=`2px solid ${color}55`;chav.style.color=color;
  document.getElementById('ch-nm').textContent=otherUser.name;
  document.getElementById('ch-st').textContent=otherUser.email;
  document.getElementById('empty').style.display='none';
  const ac=document.getElementById('active-chat');
  ac.style.display='flex';

  // Mobile
  if(window.innerWidth<=640){
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('chat-area').classList.add('show');
  }

  if(msgUnsub)msgUnsub();
  lastCount=0;
  const q=query(collection(db,'conversations',cid,'messages'),orderBy('time','asc'),limit(100));
  msgUnsub=onSnapshot(q,snap=>{
    const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(lastCount>0&&msgs.length>lastCount){
      const m=msgs[msgs.length-1];
      if(m.senderId!==me.uid)toast(otherUser.name,m.type==='image'?'📷 أرسل صورة':m.text,gc(otherUser.uid));
    }
    lastCount=msgs.length;
    renderMsgs(msgs);
  });
};

function renderMsgs(msgs){
  const wrap=document.getElementById('msgs');
  if(!msgs.length){wrap.innerHTML='<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px">ابدأ المحادثة! 👋</div>';return;}
  wrap.innerHTML=msgs.map((m,i)=>{
    const isMe=m.senderId===me.uid,time=m.time?fmt(m.time.toDate()):'';
    const color=isMe?gc(me.uid):gc(otherUser?.uid||'x');
    const letter=isMe?gl(me.displayName):gl(otherUser?.name);
    const av=`<div class="mav" style="background:${color}22;color:${color}">${letter}</div>`;
    const te=`<div class="mt" style="${isMe?'':'justify-content:flex-end'}">${time}${isMe?' <span style="color:#a78bfa">✓✓</span>':''}</div>`;
    let bubble=m.type==='image'
      ?`<div class="mb mimg-b"><img class="mimg" src="${m.imageUrl}" onclick="openLbox('${m.imageUrl}')" loading="lazy"/>${te}</div>`
      :`<div class="mb">${m.text}${te}</div>`;
    return`<div class="mrow ${isMe?'me':'them'}" style="animation-delay:${i*.01}s">${!isMe?av:''}${bubble}${isMe?av:''}</div>`;
  }).join('');
  wrap.scrollTop=wrap.scrollHeight;
}

// SEND
window.send=async()=>{
  if(pendImg){sendImg();return;}
  const inp=document.getElementById('txt'),text=inp.value.trim();
  if(!text||!chatId)return;
  inp.value='';resize(inp);snd('send');
  await addDoc(collection(db,'conversations',chatId,'messages'),{text,senderId:me.uid,time:serverTimestamp(),type:'text'});
  await updateDoc(doc(db,'conversations',chatId),{lastMsg:text,lastTime:serverTimestamp()});
};

window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
window.resize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';};

// IMAGE
window.handleImg=inp=>{
  const file=inp.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('الصورة أكبر من 5MB');return;}
  pendImg=file;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('img-prev').src=e.target.result;document.getElementById('img-prev-wrap').classList.add('show');};
  r.readAsDataURL(file);inp.value='';
};

window.cancelImg=()=>{pendImg=null;document.getElementById('img-prev-wrap').classList.remove('show');};

function sendImg(){
  if(!pendImg||!chatId)return;
  const file=pendImg;pendImg=null;
  document.getElementById('img-prev-wrap').classList.remove('show');
  snd('send');
  const bar=document.getElementById('upbar');
  const sr=ref(storage,`chats/${chatId}/${Date.now()}_${file.name}`);
  const task=uploadBytesResumable(sr,file);
  task.on('state_changed',
    s=>{bar.style.width=(s.bytesTransferred/s.totalBytes*100)+'%';},
    err=>{alert('فشل: '+err.message);bar.style.width='0%';},
    async()=>{
      const url=await getDownloadURL(task.snapshot.ref);
      bar.style.width='0%';
      await addDoc(collection(db,'conversations',chatId,'messages'),{imageUrl:url,senderId:me.uid,time:serverTimestamp(),type:'image'});
      await updateDoc(doc(db,'conversations',chatId),{lastMsg:'📷 صورة',lastTime:serverTimestamp()});
    }
  );
}

// LIGHTBOX
window.openLbox=url=>{document.getElementById('lbox-img').src=url;document.getElementById('lbox').classList.add('show');};
window.closeLbox=()=>document.getElementById('lbox').classList.remove('show');

// NEW CHAT
window.openNew=()=>{document.getElementById('modal').classList.add('show');document.getElementById('m-email').value='';document.getElementById('m-err').style.display='none';};
window.closeNew=()=>document.getElementById('modal').classList.remove('show');

window.startChat=async()=>{
  const email=document.getElementById('m-email').value.trim().toLowerCase();
  const err=document.getElementById('m-err');err.style.display='none';
  if(!email){err.textContent='أدخل البريد';err.style.display='block';return;}
  if(email===me.email.toLowerCase()){err.textContent='مش ممكن تكلم نفسك 😄';err.style.display='block';return;}
  const snap=await getDocs(query(collection(db,'users'),where('email','==',email)));
  if(snap.empty){err.textContent='مش لاقي المستخدم ده';err.style.display='block';return;}
  const other=snap.docs[0].data(),cid=gid(me.uid,other.uid);
  const cd=await getDoc(doc(db,'conversations',cid));
  if(!cd.exists())await setDoc(doc(db,'conversations',cid),{members:[me.uid,other.uid],lastMsg:'',lastTime:serverTimestamp()});
  closeNew();openChat(cid,other.uid);
};

// EMOJI
const EMOJIS=["😊","😂","❤️","👍","🔥","✨","🙏","😍","🎉","💯","😎","🌟","💪","🤔","😢","🥰","👋","🎊","💬","⭐","🌙","☀️","🎈","💎"];
document.getElementById('emj-panel').innerHTML=EMOJIS.map(e=>`<button class="ep-btn" onclick="addEmj('${e}')">${e}</button>`).join('');
window.toggleEmj=()=>document.getElementById('emj-panel').classList.toggle('show');
window.addEmj=e=>{const i=document.getElementById('txt');i.value+=e;i.focus();};

// MOBILE BACK
window.goBack=()=>{
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-area').classList.remove('show');
  document.getElementById('active-chat').style.display='none';
  document.getElementById('empty').style.display='flex';
  chatId=null;
};

// TIME FORMAT
function fmt(date){
  const now=new Date(),diff=now-date;
  if(diff<86400000)return date.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  if(diff<604800000)return['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][date.getDay()];
  return date.toLocaleDateString('ar-EG');
}
